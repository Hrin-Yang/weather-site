<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天气灵感站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css?v=20260624-location-cleanup">
</head>
<body>
  <div class="cyber-bg" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <main class="app-shell">
    <section class="hero-panel">
      <div class="hero-copy">
        <p class="eyebrow">Weather Pulse</p>
        <h1 class="gradient-title">今天的晴雨与风，都想先讲给你听</h1>
        <p class="hero-text">选择地区或直接搜索城市，查看实时天气、分时段降雨、未来趋势，并给出是否带伞、怎么穿、何时避雨的实用提示。</p>
      </div>

      <form class="search-card" id="search-form">
        <label for="city-input">选择地区</label>
        <div class="search-box" id="search-box">
          <div class="search-row">
            <input id="city-input" name="city" type="search" autocomplete="off" placeholder="搜索城市 / 区县，例如：浠水、武汉、上海" value="浠水">
            <button type="button" class="locate-button" id="locate-button">定位</button>
            <button type="submit">查看</button>
          </div>

          <div class="area-dropdown" id="area-dropdown" hidden>
            <div class="dropdown-section" id="recent-panel" hidden>
              <div class="picker-title">最近搜索</div>
              <div class="chip-grid" id="recent-list"></div>
            </div>

            <div class="dropdown-section" id="hot-panel">
              <div class="picker-title">热门地区</div>
              <div class="chip-grid" id="hot-list"></div>
            </div>

            <div class="dropdown-section" id="area-panel">
              <div class="picker-tabs" aria-label="地区层级">
                <button type="button" class="active" data-level="province">省份</button>
                <button type="button" data-level="city" disabled>城市</button>
                <button type="button" data-level="district" disabled>区县</button>
              </div>
              <div class="picker-title" id="picker-title">选择省份</div>
              <div class="chip-grid area-options" id="area-options"></div>
            </div>
          </div>
        </div>
      </form>
    </section>

    <section class="status-bar" id="status-bar">
      <span class="pulse"></span>
      <span id="status-text">正在读取天气数据...</span>
    </section>

    <section class="dashboard" id="dashboard" hidden>
      <article class="current-card">
        <div>
          <p class="section-label" id="location-label">湖北 · 黄冈 · 浠水</p>
          <h2 id="weather-title">多云</h2>
          <p class="summary" id="weather-summary">适合出门，注意午后降雨变化。</p>
        </div>
        <div class="temp-wrap">
          <span id="weather-icon" aria-hidden="true">☁</span>
          <strong id="current-temp">--°</strong>
        </div>
      </article>

      <article class="advice-card" id="advice-card">
        <p class="section-label">今日提示</p>
        <h3 id="advice-title">正在判断</h3>
        <p id="advice-body">稍等一下，马上给你更像朋友提醒的天气建议。</p>
      </article>

      <article class="metrics-grid">
        <div class="metric">
          <span>降雨概率</span>
          <strong id="rain-probability">--%</strong>
        </div>
        <div class="metric">
          <span>预计降水</span>
          <strong id="rain-total">-- mm</strong>
        </div>
        <div class="metric">
          <span>最高 / 最低</span>
          <strong id="temp-range">--° / --°</strong>
        </div>
        <div class="metric">
          <span>体感温度</span>
          <strong id="apparent-temp">--°</strong>
        </div>
      </article>
    </section>

    <section class="content-grid" id="content-grid" hidden>
      <article class="panel">
        <div class="panel-heading">
          <div>
            <p class="section-label">Hourly Rain</p>
            <h3>分时段降雨</h3>
          </div>
          <span id="best-window">--</span>
        </div>
        <div class="hour-list" id="hour-list"></div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <div>
            <p class="section-label">7 Days</p>
            <h3>未来趋势</h3>
          </div>
        </div>
        <div class="forecast-list" id="forecast-list"></div>
      </article>

      <article class="panel lifestyle-panel">
        <div class="panel-heading">
          <div>
            <p class="section-label">Life Tips</p>
            <h3>生活建议</h3>
          </div>
        </div>
        <div class="tips-grid" id="tips-grid"></div>
      </article>
    </section>
  </main>

  <script src="./assets/area-data.js?v=20260624-location-cleanup"></script>
  <script src="./assets/app.js?v=20260624-location-cleanup"></script>
</body>
</html>
